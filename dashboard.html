<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --danger:   #f85149;
      --warn:     #d29922;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 2rem;
      gap: 2rem;
    }

    /* ── Header: clock + date ── */
    header {
      text-align: center;
      padding: 2rem 1rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    #clock {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 200;
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #date {
      margin-top: 0.5rem;
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Main grid ── */
    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      align-items: start;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Weather card ── */
    #weather-wrap {
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .weather-icon {
      font-size: 3.5rem;
      line-height: 1;
    }

    .weather-temp {
      font-size: 3rem;
      font-weight: 200;
      color: var(--accent);
      line-height: 1;
    }

    .weather-desc {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .weather-meta {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .weather-meta span {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .weather-meta strong {
      color: var(--text);
    }

    #weather-error {
      color: var(--danger);
      font-size: 0.9rem;
    }

    #weather-loading {
      color: var(--muted);
      font-size: 0.9rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Links card ── */
    .links-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .links-list li a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 0.9rem;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .links-list li a:hover {
      background: rgba(88, 166, 255, 0.08);
      border-color: var(--accent);
      color: var(--accent);
    }

    .link-icon {
      font-size: 1.1rem;
      width: 1.5rem;
      text-align: center;
      flex-shrink: 0;
    }

    .link-label {
      flex: 1;
    }

    .link-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 99px;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      border: 1px solid rgba(88, 166, 255, 0.3);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: var(--border);
      padding-bottom: 0.5rem;
    }

    footer span { color: var(--muted); }
  </style>
</head>
<body>

  <header>
    <div id="clock">00:00:00</div>
    <div id="date">Loading…</div>
  </header>

  <main>

    <!-- Weather -->
    <div class="card">
      <div class="card-title">&#9925; Birmingham Weather</div>
      <div id="weather-wrap">
        <span id="weather-loading">Fetching weather…</span>
      </div>
    </div>

    <!-- Family Links -->
    <div class="card">
      <div class="card-title">&#128279; Family Links</div>
      <ul class="links-list">
        <li>
          <a href="http://localhost:8080" target="_blank">
            <span class="link-icon">&#127968;</span>
            <span class="link-label">Home Server</span>
            <span class="link-badge">local</span>
          </a>
        </li>
        <li>
          <a href="http://localhost:8096" target="_blank">
            <span class="link-icon">&#127916;</span>
            <span class="link-label">Jellyfin</span>
            <span class="link-badge">media</span>
          </a>
        </li>
        <li>
          <a href="http://localhost:8181" target="_blank">
            <span class="link-icon">&#128214;</span>
            <span class="link-label">Tautulli</span>
            <span class="link-badge">stats</span>
          </a>
        </li>
        <li>
          <a href="http://localhost:9117" target="_blank">
            <span class="link-icon">&#128269;</span>
            <span class="link-label">Jackett</span>
            <span class="link-badge">indexer</span>
          </a>
        </li>
        <li>
          <a href="http://localhost:8888" target="_blank">
            <span class="link-icon">&#128247;</span>
            <span class="link-label">Photos</span>
            <span class="link-badge">family</span>
          </a>
        </li>
        <li>
          <a href="https://calendar.google.com" target="_blank">
            <span class="link-icon">&#128197;</span>
            <span class="link-label">Family Calendar</span>
          </a>
        </li>
        <li>
          <a href="https://drive.google.com" target="_blank">
            <span class="link-icon">&#128190;</span>
            <span class="link-label">Google Drive</span>
          </a>
        </li>
      </ul>
    </div>

  </main>

  <footer>
    Home Dashboard &mdash; <span id="footer-host">localhost:8080</span>
  </footer>

  <script>
    // ── Clock & Date ──────────────────────────────────────────────
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      document.getElementById('clock').textContent =
        pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
      document.getElementById('date').textContent =
        DAYS[now.getDay()] + ', ' +
        now.getDate() + ' ' + MONTHS[now.getMonth()] + ' ' + now.getFullYear();
    }
    tick();
    setInterval(tick, 1000);

    // ── Weather (Open-Meteo, no API key needed) ───────────────────
    // Birmingham, UK: 52.4862°N, 1.8904°W
    const WEATHER_URL =
      'https://api.open-meteo.com/v1/forecast' +
      '?latitude=52.4862&longitude=-1.8904' +
      '&current=temperature_2m,apparent_temperature,weathercode,' +
      'windspeed_10m,relative_humidity_2m' +
      '&wind_speed_unit=mph' +
      '&timezone=Europe%2FLondon';

    // WMO Weather Interpretation Codes → {label, emoji}
    function wmoInterpret(code) {
      if (code === 0)            return { label: 'Clear sky',            icon: '&#9728;' };
      if (code <= 2)             return { label: 'Mainly clear',         icon: '&#9925;' };
      if (code === 3)            return { label: 'Overcast',             icon: '&#9729;' };
      if (code <= 49)            return { label: 'Foggy',                icon: '&#127787;' };
      if (code <= 55)            return { label: 'Drizzle',              icon: '&#127746;' };
      if (code <= 67)            return { label: 'Rain',                 icon: '&#127783;' };
      if (code <= 77)            return { label: 'Snow',                 icon: '&#10052;' };
      if (code <= 82)            return { label: 'Rain showers',         icon: '&#127783;' };
      if (code <= 86)            return { label: 'Snow showers',         icon: '&#127784;' };
      if (code === 95)           return { label: 'Thunderstorm',         icon: '&#9928;' };
      if (code <= 99)            return { label: 'Thunderstorm & hail',  icon: '&#9928;' };
      return { label: 'Unknown', icon: '&#10068;' };
    }

    async function fetchWeather() {
      const wrap    = document.getElementById('weather-wrap');
      const loading = document.getElementById('weather-loading');
      try {
        const res  = await fetch(WEATHER_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const c    = data.current;
        const wmo  = wmoInterpret(c.weathercode);

        wrap.innerHTML = `
          <div class="weather-main">
            <div class="weather-icon">${wmo.icon}</div>
            <div>
              <div class="weather-temp">${Math.round(c.temperature_2m)}&deg;C</div>
              <div class="weather-desc">${wmo.label}</div>
            </div>
          </div>
          <div class="weather-meta">
            <span>Feels like <strong>${Math.round(c.apparent_temperature)}&deg;C</strong></span>
            <span>Humidity <strong>${c.relative_humidity_2m}%</strong></span>
            <span>Wind <strong>${Math.round(c.windspeed_10m)} mph</strong></span>
          </div>
          <div style="font-size:0.72rem;color:var(--border);margin-top:0.5rem;">
            Updated ${new Date().toLocaleTimeString('en-GB')} &bull; Open-Meteo
          </div>`;
      } catch (err) {
        wrap.innerHTML =
          `<span id="weather-error">&#9888; Could not load weather (${err.message})</span>`;
      }
    }

    fetchWeather();
    // Refresh every 10 minutes
    setInterval(fetchWeather, 10 * 60 * 1000);

    // Footer hostname
    document.getElementById('footer-host').textContent = location.host || 'localhost:8080';
  </script>
</body>
</html>
