<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kings Norton Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --surface2: #1c2128;
      --border:   #30363d;
      --accent:   #58a6ff;
      --green:    #3fb950;
      --yellow:   #d29922;
      --red:      #f85149;
      --purple:   #bc8cff;
      --orange:   #e3b341;
      --pink:     #f778ba;
      --muted:    #8b949e;
      --text:     #e6edf3;
      --sky:      #79c0ff;
      --chartreuse: #7ee787;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-bottom: 4rem; /* room for ticker */
    }

    /* ── HEADER ────────────────────────────────────────── */
    header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem 2rem;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1.6fr 1fr;
      gap: 1.5rem;
      align-items: center;
    }
    header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--purple), var(--orange), var(--green));
    }

    .header-left  { display: flex; flex-direction: column; gap: 0.5rem; }
    .header-right { display: flex; flex-direction: column; gap: 0.5rem; text-align: right; align-items: flex-end; }

    #clock {
      text-align: center;
      font-size: clamp(3rem, 9vw, 6rem);
      font-weight: 200;
      letter-spacing: 0.04em;
      color: var(--orange);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #greeting {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    #date-display {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--sky);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    #moon-display {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .location-tag {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #wisdom {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.5;
      max-width: 220px;
      text-align: right;
      transition: opacity 0.6s;
    }

    /* ── GRIDS ─────────────────────────────────────────── */
    .grid-3 {
      display: grid;
      grid-template-columns: 2fr 2.5fr 1.4fr;
      gap: 1rem;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1.4fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 900px) {
      header { grid-template-columns: 1fr; text-align: center; }
      .header-right { align-items: center; text-align: center; }
      #wisdom { text-align: center; }
      .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    /* ── CARD BASE ─────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .card-title .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── WEATHER ───────────────────────────────────────── */
    .wx-current { display: flex; align-items: center; gap: 1rem; }
    .wx-icon { font-size: 2.8rem; line-height: 1; }
    .wx-temp { font-size: 2.6rem; font-weight: 200; color: var(--orange); line-height: 1; }
    .wx-desc { font-size: 0.85rem; color: var(--muted); margin-top: 0.2rem; }
    .wx-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .wx-meta span { font-size: 0.78rem; color: var(--muted); }
    .wx-meta strong { color: var(--text); }
    .wx-quip {
      font-size: 0.82rem; color: var(--text); font-style: italic;
      padding: 0.6rem 0.9rem; background: var(--surface2);
      border-radius: 7px; border-left: 3px solid var(--orange);
    }
    .wx-tomorrow { margin-top: 0.25rem; }
    .wx-tmr-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
    }
    .wx-hourly { display: flex; flex-direction: column; gap: 0.25rem; }
    .wx-hour {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; padding: 0.2rem 0;
    }
    .wx-hour-time { color: var(--muted); width: 3.5rem; flex-shrink: 0; }
    .wx-hour-temp { color: var(--orange); width: 3rem; flex-shrink: 0; font-weight: 600; }
    .wx-hour-desc { color: var(--text); flex: 1; }
    .wx-hour-rain { color: var(--accent); font-size: 0.75rem; }

    /* ── TRAINS ────────────────────────────────────────── */
    .dep-row {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.7rem; background: var(--surface2);
      border-radius: 7px; font-size: 0.85rem;
    }
    .dep-time { font-weight: 700; min-width: 3rem; font-variant-numeric: tabular-nums; color: var(--accent); }
    .dep-dest { flex: 1; }
    .dep-plat { font-size: 0.7rem; color: var(--muted); white-space: nowrap; }
    .dep-status-ok  { color: var(--green);  font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
    .dep-status-del { color: var(--yellow); font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
    .dep-status-can { color: var(--red);    font-size: 0.78rem; font-weight: 600; white-space: nowrap; text-decoration: line-through; }

    /* ── BUSES ─────────────────────────────────────────── */
    .bus-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0.7rem; background: var(--surface2);
      border-radius: 7px; font-size: 0.83rem;
    }
    .bus-badge {
      font-size: 0.72rem; font-weight: 800; padding: 0.18rem 0.5rem;
      border-radius: 5px; min-width: 2.4rem; text-align: center; flex-shrink: 0;
      background: rgba(188,140,255,0.15); color: var(--purple);
      border: 1px solid rgba(188,140,255,0.3);
    }
    .bus-time { font-weight: 700; color: var(--text); min-width: 3rem; font-variant-numeric: tabular-nums; }
    .bus-dest { flex: 1; color: var(--muted); }
    .bus-approx { font-size: 0.72rem; color: var(--muted); }

    /* ── NEWS ──────────────────────────────────────────── */
    .news-item {
      display: flex; gap: 0.5rem; padding: 0.45rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none; color: var(--text);
      transition: color 0.15s; align-items: flex-start;
    }
    .news-item:last-child { border-bottom: none; padding-bottom: 0; }
    .news-item:hover { color: var(--accent); }
    .news-num { font-size: 0.68rem; font-weight: 700; color: var(--muted); padding-top: 0.1rem; min-width: 1rem; }
    .news-headline { font-size: 0.85rem; line-height: 1.4; }
    .news-time { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── CALENDAR ──────────────────────────────────────── */
    .cal-event {
      padding: 0.55rem 0.85rem; background: var(--surface2);
      border-radius: 7px; border-left: 3px solid var(--orange);
      margin-bottom: 0.4rem;
    }
    .cal-event-time { font-size: 0.72rem; color: var(--muted); }
    .cal-event-title { font-size: 0.88rem; font-weight: 500; margin-top: 0.1rem; }
    .cal-setup {
      padding: 0.8rem 0.9rem; background: var(--surface2);
      border-radius: 7px; font-size: 0.8rem; color: var(--muted);
      line-height: 1.65; border: 1px dashed var(--border);
    }
    .cal-setup code {
      background: var(--bg); padding: 0.1rem 0.35rem;
      border-radius: 3px; color: var(--accent); font-size: 0.75rem;
    }

    /* ── MUSIC TICKER ──────────────────────────────────── */
    #ticker-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2.6rem;
      background: #0d0d17;
      border-top: 1px solid rgba(247,120,186,0.3);
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    #ticker-label {
      flex-shrink: 0;
      padding: 0 0.9rem;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--pink);
      border-right: 1px solid rgba(247,120,186,0.3);
      white-space: nowrap;
    }
    #ticker-track { flex: 1; overflow: hidden; position: relative; }
    #ticker-content {
      position: absolute;
      white-space: nowrap;
      font-size: 0.82rem;
      color: var(--text);
      top: 50%;
      transform: translateY(-50%);
    }
    #ticker-content .t-sep { color: var(--pink); margin: 0 0.7rem; }

    /* ── LOADING / ERROR ───────────────────────────────── */
    .loading { color: var(--muted); font-size: 0.85rem; font-style: italic; animation: pulse 1.4s ease-in-out infinite; }
    .err { color: var(--red); font-size: 0.82rem; }
    .quip-wrap { padding: 0.5rem 0.1rem; }
    .quip-main { font-size: 0.9rem; font-weight: 600; color: var(--yellow); }
    .quip-sub  { font-size: 0.82rem; color: var(--muted); font-style: italic; margin-top: 0.25rem; }
    .empty-note { font-size: 0.85rem; color: var(--green); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── MISC ──────────────────────────────────────────── */
    .updated-note { font-size: 0.67rem; color: var(--border); text-align: right; margin-top: 0.3rem; }
    .section-label {
      font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem;
      margin-top: 0.6rem;
    }
    .section-label:first-child { margin-top: 0; }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div id="date-display">—</div>
    <div id="moon-display">—</div>
  </div>
  <div>
    <div id="clock">00:00:00</div>
    <div id="greeting"></div>
  </div>
  <div class="header-right">
    <div class="location-tag">Kings Norton · B38</div>
    <div id="wisdom"></div>
  </div>
</header>

<!-- ── ROW 1: Weather | Trains | Calendar ─────────────── -->
<div class="grid-3">

  <div class="card">
    <div class="card-title" style="color:var(--orange)"><span class="dot" style="background:var(--orange)"></span>Birmingham Weather</div>
    <div id="weather-wrap"><span class="loading">Fetching weather…</span></div>
  </div>

  <div class="card">
    <div class="card-title" style="color:var(--green)"><span class="dot" style="background:var(--green)"></span>Trains → Birmingham</div>
    <div id="trains-wrap"><span class="loading">Loading departures…</span></div>
  </div>

  <div class="card">
    <div class="card-title" style="color:var(--accent)"><span class="dot" style="background:var(--accent)"></span>Calendar</div>
    <div id="cal-wrap"><span class="loading">Loading calendar…</span></div>
  </div>

</div>

<!-- ── ROW 2: Buses | Brum | UK News | Sport ──────────── -->
<div class="grid-4">

  <div class="card">
    <div class="card-title" style="color:var(--purple)"><span class="dot" style="background:var(--purple)"></span>Buses 45 &middot; 49</div>
    <div id="buses-wrap"></div>
  </div>

  <div class="card">
    <div class="card-title" style="color:var(--orange)"><span class="dot" style="background:var(--orange)"></span>Birmingham</div>
    <div id="brum-wrap"><span class="loading">Loading…</span></div>
  </div>

  <div class="card">
    <div class="card-title" style="color:var(--sky)"><span class="dot" style="background:var(--sky)"></span>UK News</div>
    <div id="news-wrap"><span class="loading">Loading…</span></div>
  </div>

  <div class="card">
    <div class="card-title" style="color:var(--chartreuse)"><span class="dot" style="background:var(--chartreuse)"></span>Sport</div>
    <div id="sport-wrap"><span class="loading">Loading…</span></div>
  </div>

</div>

<!-- ── MUSIC TICKER ────────────────────────────────────── -->
<div id="ticker-bar">
  <div id="ticker-label">&#9834; Music</div>
  <div id="ticker-track">
    <div id="ticker-content"><span class="loading">Loading music news…</span></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CLOCK + GREETING
// ═══════════════════════════════════════════════════════════
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function pad(n) { return String(n).padStart(2,'0'); }

function greeting(h) {
  if (h >= 5  && h < 12) return 'Good morning';
  if (h >= 12 && h < 17) return 'Good afternoon';
  if (h >= 17 && h < 21) return 'Good evening';
  return "You're up late";
}

function tick() {
  const n = new Date(), h = n.getHours();
  document.getElementById('clock').textContent = `${pad(h)}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  document.getElementById('date-display').textContent =
    `${DAYS[n.getDay()].toUpperCase()}  ${n.getDate()} ${MONTHS[n.getMonth()].toUpperCase()} ${n.getFullYear()}`;
  document.getElementById('greeting').textContent = greeting(h);
  updateMoon(n);
}
tick(); setInterval(tick, 1000);

// ═══════════════════════════════════════════════════════════
//  MOON PHASE
// ═══════════════════════════════════════════════════════════
function getMoonPhase(d) {
  const known   = new Date(2000, 0, 6);
  const diff    = (d - known) / 86400000;
  const phase   = ((diff % 29.53) + 29.53) % 29.53;
  const names   = ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous',
                   'Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const emojis  = ['🌑','🌒','🌓','🌔',
                   '🌕','🌖','🌗','🌘'];
  const i = Math.floor(phase / 29.53 * 8);
  return { name: names[i], emoji: emojis[i] };
}

function updateMoon(d) {
  const m = getMoonPhase(d);
  document.getElementById('moon-display').textContent = `${m.emoji}  ${m.name}`;
}

// ═══════════════════════════════════════════════════════════
//  WISDOM TICKER
// ═══════════════════════════════════════════════════════════
const WISDOMS = [
  "Kings Norton: est. 7th century. Tesco: 2003.",
  "The 49 will come. Eventually. In its own time.",
  "Network Rail: always believing in tomorrow.",
  "Birmingham has more canals than Venice. Venice has fewer delays.",
  "You are approximately 4 miles from the Bull Ring.",
  "Kings Norton Green: still there, still lovely, still no parking.",
  "Longbridge: where Rovers once roamed.",
  "If the 45 is late, consider it a gift of unplanned contemplation.",
  "West Midlands Rail apologises for any inconvenience.",
  "The Archers was first broadcast near here. Make of that what you will.",
];
let _wi = 0;
function nextWisdom() {
  const el = document.getElementById('wisdom');
  el.style.opacity = 0;
  setTimeout(() => {
    el.textContent = WISDOMS[_wi++ % WISDOMS.length];
    el.style.opacity = 1;
  }, 600);
}
nextWisdom(); setInterval(nextWisdom, 30000);

// ═══════════════════════════════════════════════════════════
//  WEATHER — wttr.in (no API key, CORS enabled)
// ═══════════════════════════════════════════════════════════
const WEATHER_QUIPS = {
  113: ["Genuinely nice out. Don't waste it.", "Sun's out. Birmingham looks almost attractive."],
  default: ["Classic Brummie sky.", "Could be worse. Could be raining."],
  rain: ["Classic.", "It's grim up the Midlands.", "Wet. Very wet."],
  storm: ["Absolutely biblical out there.", "Stay in. Seriously."],
  snow: ["Snow in Birmingham. Chaos incoming.", "One inch. City grinds to a halt."],
};

function wttrIcon(code) {
  const c = parseInt(code);
  if (c === 113) return { i: '☀', label: 'Sunny' };
  if (c === 116) return { i: '⛅', label: 'Partly cloudy' };
  if (c === 119 || c === 122) return { i: '☁', label: 'Cloudy' };
  if ([143,248,260].includes(c)) return { i: '🌫', label: 'Foggy' };
  if ([176,263,266,293,296].includes(c)) return { i: '🌦', label: 'Light rain' };
  if ([299,302,305,308].includes(c)) return { i: '🌧', label: 'Rain' };
  if ([200,386,389,392,395].includes(c)) return { i: '⛈', label: 'Thunderstorm' };
  if (c >= 179 && c <= 395) return { i: '🌨', label: 'Snow / sleet' };
  return { i: '🌤', label: 'Mixed' };
}

function clothingNarrative(tempC, feelsC, code) {
  const t = parseInt(feelsC);
  const isRain  = [176,263,266,293,296,299,302,305,308].includes(parseInt(code));
  const isSnow  = parseInt(code) >= 179 && parseInt(code) <= 338;
  const isStorm = [200,386,389,392,395].includes(parseInt(code));
  const rain    = isRain ? ' Bring an umbrella.' : '';
  if (isStorm) return 'Stormy out there — stay safe if you must go out.';
  if (isSnow)  return 'Snow expected. Warm coat, waterproof boots, gloves.';
  if (t <= 0)  return 'Freezing. Full winter kit — thermals, coat, gloves, scarf.';
  if (t <= 5)  return `Very cold. Heavy coat, scarf and gloves essential.${rain}`;
  if (t <= 10) return `Cold — you'll need a proper coat.${rain}`;
  if (t <= 14) return `Jacket weather. A mid-layer will do.${rain}`;
  if (t <= 18) return `Mild. Light jacket or cardigan.${rain}`;
  if (t <= 22) return `Warm and pleasant. T-shirt weather.${rain}`;
  return 'Hot one! Light clothes, sun cream, stay hydrated.';
}

function getWeatherQuip(code) {
  const c = parseInt(code);
  if (c === 113) return WEATHER_QUIPS[113][Math.random() < 0.5 ? 0 : 1];
  if ([200,386,389].includes(c)) return WEATHER_QUIPS.storm[0];
  if (c >= 179 && c <= 338) return WEATHER_QUIPS.snow[Math.random() < 0.5 ? 0 : 1];
  if ([176,263,266,293,296,299,302,305,308].includes(c))
    return WEATHER_QUIPS.rain[Math.floor(Math.random()*3)];
  return WEATHER_QUIPS.default[Math.random() < 0.5 ? 0 : 1];
}

function renderHourly(hourly) {
  const now = new Date().getHours();
  return hourly.filter(h => {
    const hr = Math.floor(parseInt(h.time) / 100);
    return hr >= now;
  }).slice(0, 4).map(h => {
    const hr   = Math.floor(parseInt(h.time) / 100);
    const desc = h.weatherDesc[0].value;
    const temp = h.tempC;
    const rain = parseFloat(h.precipMM || 0);
    const icon = wttrIcon(h.weatherCode);
    return `<div class="wx-hour">
      <span class="wx-hour-time">${pad(hr)}:00</span>
      <span style="font-size:1rem">${icon.i}</span>
      <span class="wx-hour-temp">${temp}°</span>
      <span class="wx-hour-desc">${desc}</span>
      ${rain > 0 ? `<span class="wx-hour-rain">${rain}mm</span>` : ''}
    </div>`;
  }).join('');
}

async function fetchWeather() {
  const wrap = document.getElementById('weather-wrap');
  try {
    const res  = await fetch('https://wttr.in/Kings+Norton,Birmingham?format=j1',
                             { headers: { 'User-Agent': 'curl/7.68.0' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d    = await res.json();
    const cur  = d.current_condition[0];
    const icon = wttrIcon(cur.weatherCode);
    const tmr  = d.weather[1];

    wrap.innerHTML = `
      <div class="wx-current">
        <div class="wx-icon">${icon.i}</div>
        <div>
          <div class="wx-temp">${cur.temp_C}°C</div>
          <div class="wx-desc">${icon.label}</div>
        </div>
      </div>
      <div class="wx-meta">
        <span>Feels <strong>${cur.FeelsLikeC}°C</strong></span>
        <span>Humidity <strong>${cur.humidity}%</strong></span>
        <span>Wind <strong>${Math.round(parseInt(cur.windspeedKmph)*0.621)} mph</strong></span>
      </div>
      <div class="wx-quip">${clothingNarrative(cur.temp_C, cur.FeelsLikeC, cur.weatherCode)}</div>
      <div class="wx-quip" style="border-color:var(--muted);color:var(--muted);font-style:normal">${getWeatherQuip(cur.weatherCode)}</div>
      <div class="wx-tomorrow">
        <div class="section-label">Tomorrow — Hi ${tmr.maxtempC}° Lo ${tmr.mintempC}°</div>
        <div class="wx-hourly">${renderHourly(tmr.hourly)}</div>
      </div>
      <div class="updated-note">wttr.in · ${new Date().toLocaleTimeString('en-GB')}</div>`;
  } catch (err) {
    wrap.innerHTML = `<div class="quip-wrap">
      <div class="quip-main">Try looking out the window.</div>
      <div class="quip-sub">wttr.in unavailable (${err.message})</div>
    </div>`;
  }
}
fetchWeather(); setInterval(fetchWeather, 10*60*1000);

// ═══════════════════════════════════════════════════════════
//  TRAINS — Huxley2 / National Rail
// ═══════════════════════════════════════════════════════════
async function fetchTrains() {
  const wrap = document.getElementById('trains-wrap');
  try {
    const res  = await fetch('https://huxley2.azurewebsites.net/departures/KNN/12');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const all  = data.trainServices || [];

    const bhm = all.filter(s => {
      const dest = (s.destination || [{}])[0];
      const via  = dest.via || '';
      return /Birmingham/i.test(dest.locationName || '') || /Birmingham/i.test(via);
    });

    if (!bhm.length) {
      wrap.innerHTML = `<div class="quip-wrap">
        <div class="quip-main">No Birmingham services right now.</div>
        <div class="quip-sub">Network Rail: working hard, probably.</div>
      </div>`;
      return;
    }

    const rows = bhm.slice(0, 6).map(s => {
      const dest  = (s.destination || [{}])[0].locationName || 'Unknown';
      const sched = s.std || '??:??';
      const etd   = s.etd || '';
      const plat  = s.platform ? `<span class="dep-plat">Plt ${s.platform}</span>` : '';
      let status;
      if      (etd === 'On time')   status = `<span class="dep-status-ok">&#9679; On time</span>`;
      else if (etd === 'Cancelled') status = `<span class="dep-status-can">&#10005; Cancelled</span>`;
      else if (etd === 'Delayed')   status = `<span class="dep-status-del">&#9650; Delayed</span>`;
      else                          status = `<span class="dep-status-del">&#8594; ${etd}</span>`;
      return `<div class="dep-row">
        <span class="dep-time">${sched}</span>
        <span class="dep-dest">${dest}</span>
        ${plat}
        ${status}
      </div>`;
    }).join('');

    const upd = data.generatedAt ? data.generatedAt.slice(11,16) : '';
    wrap.innerHTML = rows + `<div class="updated-note">National Rail · updated ${upd}</div>`;
  } catch (err) {
    wrap.innerHTML = `<div class="quip-wrap">
      <div class="quip-main">Huxley's gone for a brew.</div>
      <div class="quip-sub">Leaves on the line, no doubt. (${err.message})</div>
    </div>`;
  }
}
fetchTrains(); setInterval(fetchTrains, 60*1000);

// ═══════════════════════════════════════════════════════════
//  BUSES — smart interval timetable
//  Routes 45 & 49 from Kings Norton (approximate schedule)
// ═══════════════════════════════════════════════════════════
const BUS_SCHEDULE = {
  '45': { dest: 'City Centre', interval: 10, first: '05:30', last: '23:15', weekend_interval: 12 },
  '49': { dest: 'Solihull',    interval: 12, first: '06:00', last: '22:40', weekend_interval: 15 },
};

function timeToMins(t) {
  const [h, m] = t.split(':').map(Number); return h*60 + m;
}
function minsToTime(m) {
  return `${pad(Math.floor(m/60) % 24)}:${pad(m % 60)}`;
}

function renderBuses() {
  const wrap = document.getElementById('buses-wrap');
  const now  = new Date();
  const dow  = now.getDay(); // 0=Sun, 6=Sat
  const mins = now.getHours()*60 + now.getMinutes();
  const isWeekend = dow === 0 || dow === 6;

  const allDeps = [];
  for (const [route, info] of Object.entries(BUS_SCHEDULE)) {
    const interval = isWeekend ? info.weekend_interval : info.interval;
    const first    = timeToMins(info.first);
    const last     = timeToMins(info.last);
    let dep = first;
    while (dep <= last) {
      if (dep >= mins) allDeps.push({ route, time: dep, dest: info.dest });
      dep += interval;
    }
  }

  allDeps.sort((a, b) => a.time - b.time);
  const next = allDeps.slice(0, 8);

  if (!next.length) {
    wrap.innerHTML = `<div class="quip-wrap">
      <div class="quip-main">The 49 is running on vibes.</div>
      <div class="quip-sub">No more services today.</div>
    </div>`;
    return;
  }

  wrap.innerHTML = next.map(d => `
    <div class="bus-row">
      <span class="bus-badge">${d.route}</span>
      <span class="bus-time">${minsToTime(d.time)}</span>
      <span class="bus-dest">${d.dest}</span>
      <span class="bus-approx">approx</span>
    </div>`).join('') + `<div class="updated-note">Based on scheduled timetable · actual times may vary</div>`;
}
renderBuses(); setInterval(renderBuses, 60*1000);

// ═══════════════════════════════════════════════════════════
//  RSS PARSING
// ═══════════════════════════════════════════════════════════
async function parseRSS(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const txt = await res.text();
  const xml = new DOMParser().parseFromString(txt, 'text/xml');
  return [...xml.querySelectorAll('item')].slice(0, 6).map(el => {
    const title = el.querySelector('title')?.textContent?.trim() || '';
    const link  = el.querySelector('link')?.nextSibling?.nodeValue?.trim()
               || el.querySelector('guid')?.textContent?.trim() || '#';
    const pub   = el.querySelector('pubDate')?.textContent?.trim() || '';
    return { title, link, pub };
  }).filter(i => i.title && i.title !== '[Removed]');
}

const CORS_PROXY = 'https://corsproxy.io/?';

async function parseRSSviaProxy(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const txt = await res.text();
  const xml = new DOMParser().parseFromString(txt, 'text/xml');
  return [...xml.querySelectorAll('item')].slice(0, 15).map(el => {
    const title = el.querySelector('title')?.textContent?.trim() || '';
    const link  = el.querySelector('link')?.nextSibling?.nodeValue?.trim()
               || el.querySelector('guid')?.textContent?.trim() || '#';
    return { title, link };
  }).filter(i => i.title);
}

function fmtPub(raw) {
  if (!raw) return '';
  try {
    const d = new Date(raw);
    const today = new Date();
    if (d.toDateString() === today.toDateString()) {
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  } catch { return ''; }
}

function renderNews(items, limit=4) {
  return items.slice(0, limit).map((it, i) => {
    const headline = it.title.replace(/ - BBC.*$/, '').trim();
    const time     = fmtPub(it.pub);
    return `<a class="news-item" href="${it.link}" target="_blank" rel="noopener">
      <span class="news-num">${i+1}</span>
      <span>
        <div class="news-headline">${headline}</div>
        ${time ? `<div class="news-time">${time}</div>` : ''}
      </span>
    </a>`;
  }).join('');
}

function showErr(wrapId, quipMain, quipSub) {
  document.getElementById(wrapId).innerHTML = `<div class="quip-wrap">
    <div class="quip-main">${quipMain}</div>
    <div class="quip-sub">${quipSub}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  CALENDAR — iCal via /cal proxy (nginx)
// ═══════════════════════════════════════════════════════════
function icalUnfold(t) { return t.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,''); }

function icalDate(str) {
  if (!str) return null;
  const s = str.replace(/[TZ:\-]/g,'');
  const y=+s.slice(0,4), m=+s.slice(4,6)-1, d=+s.slice(6,8);
  return isNaN(y) ? null : new Date(y,m,d);
}

function parseICal(raw) {
  const lines = icalUnfold(raw).split(/\r?\n/);
  const events = []; let e = null;
  for (const line of lines) {
    if (line==='BEGIN:VEVENT') { e={}; continue; }
    if (line==='END:VEVENT')   { if(e) events.push(e); e=null; continue; }
    if (!e) continue;
    const ci = line.indexOf(':'); if (ci<0) continue;
    const prop=line.slice(0,ci), val=line.slice(ci+1), base=prop.split(';')[0].toUpperCase();
    if (base==='DTSTART') {
      e.DTSTART=val; e.ALLDAY = prop.toUpperCase().includes('VALUE=DATE') || /^\d{8}$/.test(val);
    } else { e[base]=val; }
  }
  return events;
}

function occursOn(e, t) {
  if (!e.DTSTART) return false;
  const start=icalDate(e.DTSTART); if (!start) return false;
  const day=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  if (!e.RRULE) return start.toDateString()===day.toDateString();
  if (start>day) return false;
  const rule=Object.fromEntries(e.RRULE.split(';').map(p=>p.split('=')));
  if (rule.UNTIL && icalDate(rule.UNTIL)<day) return false;
  const iv=parseInt(rule.INTERVAL||'1');
  if (rule.FREQ==='DAILY') return Math.round((day-start)/86400000)%iv===0;
  if (rule.FREQ==='WEEKLY') {
    const DOW={SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};
    const days=rule.BYDAY?.split(',').map(d=>d.replace(/[+\-\d]/g,''))||null;
    if (days && !days.some(d=>DOW[d]===day.getDay())) return false;
    const s0=new Date(start); s0.setDate(s0.getDate()-s0.getDay());
    const t0=new Date(day);   t0.setDate(t0.getDate()-t0.getDay());
    return Math.round((t0-s0)/(7*86400000))%iv===0;
  }
  if (rule.FREQ==='MONTHLY') return start.getDate()===day.getDate();
  if (rule.FREQ==='YEARLY')  return start.getMonth()===day.getMonth()&&start.getDate()===day.getDate();
  return false;
}

async function fetchCalendar() {
  const wrap = document.getElementById('cal-wrap');
  try {
    const res = await fetch('/cal');
    if (res.status===404) throw new Error('proxy_not_configured');
    if (!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    if (!text.includes('BEGIN:VCALENDAR')) throw new Error('not_ical');
    const events = parseICal(text);
    const today    = new Date();
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
    const todayEvs = events.filter(e=>e.ALLDAY && occursOn(e,today));
    const tmrEvs   = events.filter(e=>e.ALLDAY && occursOn(e,tomorrow));

    let html = '<div class="section-label">Today</div>';
    if (todayEvs.length) {
      html += todayEvs.map(e=>`<div class="cal-event">
        <div class="cal-event-title">&#128197; ${e.SUMMARY||'(no title)'}</div>
      </div>`).join('');
    } else {
      html += '<div class="empty-note">&#10003; Nothing on today</div>';
    }
    html += '<div class="section-label" style="margin-top:0.75rem">Tomorrow</div>';
    if (tmrEvs.length) {
      html += tmrEvs.map(e=>`<div class="cal-event" style="border-left-color:var(--border);opacity:0.7">
        <div class="cal-event-title">&#128197; ${e.SUMMARY||'(no title)'}</div>
      </div>`).join('');
    } else {
      html += '<div class="empty-note" style="opacity:0.6">Nothing on tomorrow</div>';
    }
    wrap.innerHTML = html;
  } catch(err) {
    if (err.message==='proxy_not_configured'||err.message==='not_ical') {
      wrap.innerHTML = `<div class="cal-setup">
        <strong>One-time nginx setup:</strong><br><br>
        <code>location /cal {</code><br>
        <code>&nbsp;&nbsp;proxy_pass YOUR_ICAL_URL;</code><br>
        <code>&nbsp;&nbsp;proxy_ssl_server_name on;</code><br>
        <code>}</code><br><br>
        See <strong>nginx-calendar-setup.txt</strong> for full instructions.
      </div>`;
    } else {
      wrap.innerHTML = `<div class="quip-wrap">
        <div class="quip-main">Calendar not connected.</div>
        <div class="quip-sub">See nginx-calendar-setup.txt</div>
      </div>`;
    }
  }
}
fetchCalendar(); setInterval(fetchCalendar, 15*60*1000);

// ═══════════════════════════════════════════════════════════
//  MUSIC TICKER
// ═══════════════════════════════════════════════════════════
let _tickerItems = [];
let _tickerPos   = 0;
let _tickerWidth = 0;

async function fetchMusic() {
  try {
    const items = await parseRSSviaProxy('https://www.nme.com/feed');
    _tickerItems = items.map(i => i.title.replace(/ - NME.*$/,'').trim()).filter(Boolean);
    buildTicker();
  } catch {
    try {
      const items = await parseRSS('https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml');
      _tickerItems = items.map(i => i.title.replace(/ - BBC.*/,'').trim()).filter(Boolean);
      buildTicker();
    } catch {
      _tickerItems = ['Music news unavailable — try again later'];
      buildTicker();
    }
  }
}

function buildTicker() {
  const el = document.getElementById('ticker-content');
  if (!_tickerItems.length) return;
  const html = _tickerItems.map(t =>
    `<span>${t}</span><span class="t-sep">&#9834;</span>`
  ).join('');
  el.innerHTML = html + html; // doubled for seamless loop
  el.style.transform = 'translateX(0)';
  _tickerPos = 0;
  _tickerWidth = el.scrollWidth / 2;
}

function animateTicker() {
  const el = document.getElementById('ticker-content');
  if (!el || _tickerWidth === 0) { requestAnimationFrame(animateTicker); return; }
  _tickerPos += 0.6;
  if (_tickerPos >= _tickerWidth) _tickerPos = 0;
  el.style.transform = `translateX(-${_tickerPos}px)`;
  requestAnimationFrame(animateTicker);
}

fetchMusic(); setInterval(fetchMusic, 30*60*1000);
requestAnimationFrame(animateTicker);
