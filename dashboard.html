<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kings Norton Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-1:   #080b14;
      --bg-2:   #0d1322;
      --surf:   rgba(23, 29, 47, 0.7);
      --panel:  rgba(255, 255, 255, 0.028);
      --row2:   rgba(33, 41, 64, 0.5);
      --border: rgba(255, 255, 255, 0.07);
      --bhi:    rgba(255, 255, 255, 0.12);
      --accent: #5eb3ff;
      --gold:   #ffc857;
      --green:  #4ade80;
      --yellow: #fbbf24;
      --red:    #f87171;
      --purple: #c084fc;
      --orange: #ffb454;
      --pink:   #f472b6;
      --muted:  #8b93a7;
      --text:   #e8edf7;
      --sky:    #7cc4ff;
      --lime:   #86efac;
      --font-d: 'Space Grotesk', system-ui, sans-serif;
      --font-b: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-b);
      background:
        radial-gradient(1200px 600px at 12% -8%,  rgba(94,179,255,0.10),  transparent 60%),
        radial-gradient(1000px 700px at 105% 10%,  rgba(192,132,252,0.08), transparent 55%),
        radial-gradient(900px  600px at 50%  120%, rgba(255,200,87,0.06),  transparent 60%),
        linear-gradient(170deg, var(--bg-2) 0%, var(--bg-1) 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding-bottom: 3.4rem;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    header {
      background: var(--surf);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 1.4rem;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 1.4rem;
      align-items: center;
      box-shadow: 0 10px 36px -18px rgba(0,0,0,0.65);
    }
    header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--purple), var(--gold), var(--green));
      opacity: 0.38;
    }

    #clock {
      font-family: var(--font-d);
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(180deg, #ffe2a3 0%, var(--gold) 58%, #f0a93c 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 10px rgba(255,200,87,0.18));
      white-space: nowrap;
    }
    .clock-ampm {
      font-size: 0.3em; font-weight: 500; letter-spacing: 0.06em;
      margin-left: 0.28em; vertical-align: 0.46em;
      -webkit-text-fill-color: var(--muted); filter: none;
    }

    .hdr-right { display: flex; flex-direction: column; gap: 0.3rem; min-width: 0; }

    .hdr-meta {
      display: flex; align-items: center; gap: 0.42rem;
      flex-wrap: wrap; font-size: 0.8rem; color: var(--muted); line-height: 1.4;
    }
    .hdr-meta .sep { color: var(--bhi); user-select: none; font-size: 0.7rem; }
    #date-display  { color: var(--sky); font-weight: 600; font-family: var(--font-d); letter-spacing: 0.02em; }
    #wx-garment-s  { color: var(--gold); font-weight: 600; }

    #wisdom {
      font-size: 0.68rem; color: var(--muted);
      font-style: italic; opacity: 0.55; line-height: 1.4;
      transition: opacity 0.6s;
    }

    /* ── PANELS ─────────────────────────────────────────────── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.68rem 0.88rem;
      display: flex;
      flex-direction: column;
      gap: 0.42rem;
      min-width: 0;
      overflow: hidden;
    }

    .plabel {
      font-family: var(--font-d);
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      display: flex; align-items: center; gap: 0.38rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .plabel .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    /* ── LAYOUT ROWS ────────────────────────────────────────── */
    .transport-row { display: flex; gap: 0.7rem; }
    .panel-trains  { flex: 1.8; }
    .panel-buses   { flex: 1; }

    .news-row { display: flex; gap: 0.7rem; }
    .news-row .panel { flex: 1; }

    /* ── TRAINS ─────────────────────────────────────────────── */
    .dep-row {
      display: flex; align-items: center; gap: 0.48rem;
      padding: 0.4rem 0.55rem;
      background: var(--row2);
      border: 1px solid transparent;
      border-radius: 8px; font-size: 0.83rem;
      transition: border-color 0.15s;
    }
    .dep-row:hover { border-color: rgba(94,179,255,0.2); }
    .dep-time { font-family: var(--font-d); font-weight: 600; min-width: 2.8rem; font-variant-numeric: tabular-nums; color: var(--accent); }
    .dep-dest { flex: 1; }
    .dep-ok  { color: var(--green);  font-size: 0.75rem; }
    .dep-del { color: var(--yellow); font-size: 0.75rem; font-weight: 600; }
    .dep-can { color: var(--red);    font-size: 0.75rem; font-weight: 600; }

    /* ── BUSES ──────────────────────────────────────────────── */
    .bus-row {
      display: flex; align-items: center; gap: 0.48rem;
      padding: 0.4rem 0.55rem;
      background: var(--row2);
      border: 1px solid transparent;
      border-radius: 8px; font-size: 0.83rem;
      transition: border-color 0.15s;
    }
    .bus-row:hover { border-color: rgba(192,132,252,0.2); }
    .bus-badge {
      font-size: 0.68rem; font-weight: 800; padding: 0.14rem 0.44rem;
      border-radius: 5px; min-width: 2.1rem; text-align: center; flex-shrink: 0;
      background: rgba(192,132,252,0.12); color: var(--purple);
      border: 1px solid rgba(192,132,252,0.28);
    }
    .bus-time { font-family: var(--font-d); font-weight: 600; color: var(--text); min-width: 2.8rem; font-variant-numeric: tabular-nums; }
    .bus-dest { flex: 1; color: var(--muted); font-size: 0.8rem; }

    /* ── NEWS ───────────────────────────────────────────────── */
    .news-item {
      display: flex; gap: 0.4rem; padding: 0.42rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none; color: var(--text);
      transition: color 0.15s; align-items: flex-start;
    }
    .news-item:last-child { border-bottom: none; padding-bottom: 0; }
    .news-item:hover { color: var(--accent); }
    .news-num { font-family: var(--font-d); font-size: 0.63rem; font-weight: 700; color: var(--accent); padding-top: 0.14rem; min-width: 0.95rem; }
    .news-headline { font-size: 0.82rem; line-height: 1.38; font-weight: 500; }

    /* ── TICKER ─────────────────────────────────────────────── */
    #ticker-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 2.5rem;
      background: rgba(10,12,22,0.86);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(244,114,182,0.22);
      box-shadow: 0 -6px 24px -8px rgba(244,114,182,0.14);
      overflow: hidden; display: flex; align-items: center; z-index: 50;
    }
    #ticker-label {
      flex-shrink: 0; padding: 0 0.9rem;
      font-family: var(--font-d); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--pink);
      border-right: 1px solid rgba(244,114,182,0.22); white-space: nowrap;
    }
    #ticker-track { flex: 1; overflow: hidden; position: relative; height: 100%; }
    #ticker-content {
      position: absolute; white-space: nowrap; font-size: 0.78rem;
      color: var(--text); top: 50%; left: 0;
      will-change: transform; transform: translate(0,-50%);
      animation: ticker-scroll linear infinite;
    }
    #ticker-content .t-sep { color: var(--pink); margin: 0 0.65rem; }
    @keyframes ticker-scroll {
      from { transform: translate(0,-50%); }
      to   { transform: translate(-50%,-50%); }
    }

    /* ── STATE ──────────────────────────────────────────────── */
    .loading { color: var(--muted); font-size: 0.8rem; font-style: italic; animation: pulse 1.4s ease-in-out infinite; }
    .quip-main { font-size: 0.85rem; font-weight: 600; color: var(--yellow); }
    .quip-sub  { font-size: 0.76rem; color: var(--muted); font-style: italic; margin-top: 0.2rem; }
    .empty-note { font-size: 0.82rem; color: var(--lime); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    /* ── TABLET  601–900 ────────────────────────────────────── */
    @media (max-width: 900px) {
      .transport-row { flex-wrap: wrap; }
      .panel-trains, .panel-buses { flex: 1 1 45%; }
      .news-row { flex-wrap: wrap; }
      .news-row .panel { flex: 1 1 30%; }
    }

    /* ── iPHONE 16 PRO — no-scroll ─────────────────────────── */
    @media (max-width: 430px) {
      body {
        min-height: 0; height: 100dvh; overflow: hidden;
        overscroll-behavior: none; background-attachment: scroll;
        padding: 0.42rem; padding-bottom: 2.45rem; gap: 0.38rem;
      }

      header {
        flex-shrink: 0;
        padding: 0.48rem 0.85rem; gap: 0.75rem;
        border-radius: 11px;
      }
      #clock { font-size: 2.25rem; }
      .hdr-meta { font-size: 0.7rem; gap: 0.3rem; }
      #wisdom { font-size: 0.6rem; }

      .transport-row { flex: 1.5; min-height: 0; gap: 0.38rem; }
      .panel-trains  { flex: 1.8; }
      .panel-buses   { flex: 1; }

      .news-row { flex: 1; min-height: 0; gap: 0.38rem; }
      .news-row .panel { flex: 1; }

      .panel { padding: 0.4rem 0.52rem; gap: 0.26rem; border-radius: 9px; }
      .plabel { font-size: 0.54rem; padding-bottom: 0.2rem; }
      .plabel .dot { width: 4px; height: 4px; }

      .dep-row, .bus-row { padding: 0.3rem 0.42rem; font-size: 0.76rem; border-radius: 7px; }
      .dep-time, .bus-time { min-width: 2.3rem; }
      #trains-wrap .dep-row:nth-child(n+4) { display: none; }
      #buses-wrap  .bus-row:nth-child(n+4) { display: none; }

      .news-item { padding: 0.26rem 0; }
      .news-item:nth-child(n+3) { display: none; }
      .news-headline { font-size: 0.74rem; line-height: 1.26; }
      .news-num { font-size: 0.58rem; }

      #ticker-bar     { height: 2.15rem; }
      #ticker-label   { font-size: 0.57rem; padding: 0 0.6rem; }
      #ticker-content { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────────────── -->
<header>
  <div id="clock">00:00<span class="clock-ampm">am</span></div>
  <div class="hdr-right">
    <div class="hdr-meta">
      <span id="date-display">—</span>
      <span class="sep">·</span>
      <span id="moon-display">—</span>
      <span class="sep">·</span>
      <span id="wx-icon-s"></span><span id="wx-cond-s">—</span>
      <span class="sep">·</span>
      <span id="wx-garment-s">—</span>
    </div>
    <div id="wisdom"></div>
  </div>
</header>

<!-- ── TRANSPORT ─────────────────────────────────────────────── -->
<div class="transport-row">
  <div class="panel panel-trains">
    <div class="plabel" style="color:var(--green)"><span class="dot"></span>Trains to Birmingham</div>
    <div id="trains-wrap"><span class="loading">Loading departures…</span></div>
  </div>
  <div class="panel panel-buses">
    <div class="plabel" style="color:var(--purple)"><span class="dot"></span>Buses 45 · 49</div>
    <div id="buses-wrap"></div>
  </div>
</div>

<!-- ── NEWS ──────────────────────────────────────────────────── -->
<div class="news-row">
  <div class="panel">
    <div class="plabel" style="color:var(--orange)"><span class="dot"></span>Birmingham</div>
    <div id="brum-wrap"><span class="loading">Loading…</span></div>
  </div>
  <div class="panel">
    <div class="plabel" style="color:var(--sky)"><span class="dot"></span>UK</div>
    <div id="news-wrap"><span class="loading">Loading…</span></div>
  </div>
  <div class="panel">
    <div class="plabel" style="color:var(--lime)"><span class="dot"></span>Sport</div>
    <div id="sport-wrap"><span class="loading">Loading…</span></div>
  </div>
</div>

<!-- ── MUSIC TICKER ──────────────────────────────────────────── -->
<div id="ticker-bar">
  <div id="ticker-label">&#9834; Music</div>
  <div id="ticker-track">
    <div id="ticker-content"><span class="loading">Loading music news…</span></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════════════════════
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function pad(n) { return String(n).padStart(2,'0'); }

function tick() {
  const n = new Date(), h = n.getHours();
  const h12 = h % 12 || 12;
  const ampm = h >= 12 ? 'pm' : 'am';
  document.getElementById('clock').innerHTML =
    `${h12}:${pad(n.getMinutes())}<span class="clock-ampm">${ampm}</span>`;
  document.getElementById('date-display').textContent =
    `${DAYS[n.getDay()].slice(0,3).toUpperCase()}  ${n.getDate()} ${MONTHS[n.getMonth()].slice(0,3).toUpperCase()}`;
  updateMoon(n);
}
tick(); setInterval(tick, 1000);

// ═══════════════════════════════════════════════════════════════
//  MOON
// ═══════════════════════════════════════════════════════════════
function getMoonPhase(d) {
  const diff  = (d - new Date(2000,0,6)) / 86400000;
  const phase = ((diff % 29.53) + 29.53) % 29.53;
  const names  = ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous',
                  'Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const emojis = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  const i = Math.floor(phase / 29.53 * 8);
  return `${emojis[i]} ${names[i]}`;
}
function updateMoon(d) {
  document.getElementById('moon-display').textContent = getMoonPhase(d);
}

// ═══════════════════════════════════════════════════════════════
//  WISDOM
// ═══════════════════════════════════════════════════════════════
const WISDOMS = [
  "Kings Norton: est. 7th century. Tesco: 2003.",
  "The 49 will come. Eventually. In its own time.",
  "Network Rail: always believing in tomorrow.",
  "Birmingham has more canals than Venice. Venice has fewer delays.",
  "You are approximately 4 miles from the Bull Ring.",
  "Kings Norton Green: still there, still lovely, still no parking.",
  "Longbridge: where Rovers once roamed.",
  "If the 45 is late, consider it a gift of unplanned contemplation.",
  "West Midlands Rail apologises for any inconvenience.",
  "The Archers was first broadcast near here. Make of that what you will.",
];
let _wi = 0;
function nextWisdom() {
  const el = document.getElementById('wisdom');
  el.style.opacity = 0;
  setTimeout(() => { el.textContent = WISDOMS[_wi++ % WISDOMS.length]; el.style.opacity = 1; }, 600);
}
nextWisdom(); setInterval(nextWisdom, 30000);

// ═══════════════════════════════════════════════════════════════
//  WEATHER — Open-Meteo → header meta line
// ═══════════════════════════════════════════════════════════════
const WX_URL = 'https://api.open-meteo.com/v1/forecast'
  + '?latitude=52.4862&longitude=-1.8904'
  + '&current=apparent_temperature,weathercode'
  + '&timezone=Europe%2FLondon';

function wmoIcon(c) {
  c = parseInt(c);
  if (c === 0)  return { i:'☀',  l:'Clear' };
  if (c <= 2)   return { i:'⛅', l:'Partly cloudy' };
  if (c === 3)  return { i:'☁',  l:'Overcast' };
  if (c <= 49)  return { i:'🌫', l:'Fog' };
  if (c <= 55)  return { i:'🌦', l:'Drizzle' };
  if (c <= 67)  return { i:'🌧', l:'Rain' };
  if (c <= 77)  return { i:'🌨', l:'Snow' };
  if (c <= 82)  return { i:'🌧', l:'Showers' };
  if (c <= 86)  return { i:'🌨', l:'Snow showers' };
  if (c === 95) return { i:'⛈', l:'Thunderstorm' };
  if (c <= 99)  return { i:'⛈', l:'Thunder & hail' };
  return { i:'🌤', l:'Mixed' };
}

function garmentFor(feelsC, code) {
  const t = Math.round(feelsC), c = parseInt(code);
  if ((c >= 51 && c <= 82) || c >= 95) return '🧥 Raincoat';
  if (c >= 71 && c <= 77) return '🧥 Coat';
  if (t <= 8)  return '🧥 Coat';
  if (t <= 14) return '🧥 Jacket';
  if (t <= 19) return '🧶 Hoody';
  return '👕 T-shirt';
}

async function fetchWeather() {
  try {
    const res = await fetch(WX_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { current: c } = await res.json();
    const icon = wmoIcon(c.weathercode);
    document.getElementById('wx-icon-s').textContent    = icon.i + ' ';
    document.getElementById('wx-cond-s').textContent    = icon.l;
    document.getElementById('wx-garment-s').textContent = garmentFor(c.apparent_temperature, c.weathercode);
  } catch {
    document.getElementById('wx-cond-s').textContent = '—';
  }
}
fetchWeather(); setInterval(fetchWeather, 10*60*1000);

// ═══════════════════════════════════════════════════════════════
//  TRAINS
// ═══════════════════════════════════════════════════════════════
function townOf(name) {
  return (name || '')
    .replace(/-upon-Avon/i, '')
    .replace(/\b(New Street|Moor Street|Snow Hill|International|Temple Meads|Foregate Street|Shrub Hill|Parkway|Central|Spa|Street|Road)\b/gi, '')
    .replace(/\s+/g, ' ').trim();
}

async function fetchTrains() {
  const wrap = document.getElementById('trains-wrap');
  try {
    const res  = await fetch('https://huxley2.azurewebsites.net/departures/KNN/12');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const all  = data.trainServices || [];
    const bhm  = all.filter(s => {
      const dest = (s.destination || [{}])[0];
      return /Birmingham/i.test(dest.locationName || '') || /Birmingham/i.test(dest.via || '');
    });

    if (!bhm.length) {
      wrap.innerHTML = `<div class="quip-main">No Birmingham services right now.</div>`;
      return;
    }

    wrap.innerHTML = bhm.slice(0, 6).map(s => {
      const destName = (s.destination || [{}])[0].locationName || '';
      const dest  = /Birmingham/i.test(destName) ? townOf(destName) : 'via Birmingham';
      const sched = s.std || '??:??';
      const etd   = s.etd || '';
      let status;
      if      (etd === 'On time')   status = `<span class="dep-ok">●</span>`;
      else if (etd === 'Cancelled') status = `<span class="dep-can">✕</span>`;
      else if (etd === 'Delayed')   status = `<span class="dep-del">▲</span>`;
      else                          status = `<span class="dep-del">${etd}</span>`;
      return `<div class="dep-row">
        <span class="dep-time">${sched}</span>
        <span class="dep-dest">${dest}</span>
        ${status}
      </div>`;
    }).join('');
  } catch (e) {
    wrap.innerHTML = `<div class="quip-main">Huxley's offline.</div><div class="quip-sub">${e.message}</div>`;
  }
}
fetchTrains(); setInterval(fetchTrains, 60*1000);

// ═══════════════════════════════════════════════════════════════
//  BUSES
// ═══════════════════════════════════════════════════════════════
const BUS_SCHEDULE = {
  '45': { dest: 'City Centre', interval: 10, we: 12, first: '05:30', last: '23:15' },
  '49': { dest: 'Solihull',    interval: 12, we: 15, first: '06:00', last: '22:40' },
};

function toMins(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function toTime(m) { return `${pad(Math.floor(m/60)%24)}:${pad(m%60)}`; }

function renderBuses() {
  const wrap = document.getElementById('buses-wrap');
  const now  = new Date();
  const cur  = now.getHours()*60 + now.getMinutes();
  const isWe = now.getDay()===0 || now.getDay()===6;
  const deps = [];
  for (const [route, s] of Object.entries(BUS_SCHEDULE)) {
    const iv = isWe ? s.we : s.interval;
    let t = toMins(s.first);
    const last = toMins(s.last);
    while (t <= last) { if (t >= cur) deps.push({ route, time: t, dest: s.dest }); t += iv; }
  }
  deps.sort((a,b) => a.time - b.time);
  const next = deps.slice(0, 6);
  if (!next.length) {
    wrap.innerHTML = `<div class="quip-main">No more services today.</div>`;
    return;
  }
  wrap.innerHTML = next.map(d => `
    <div class="bus-row">
      <span class="bus-badge">${d.route}</span>
      <span class="bus-time">${toTime(d.time)}</span>
      <span class="bus-dest">${d.dest}</span>
    </div>`).join('');
}
renderBuses(); setInterval(renderBuses, 60*1000);

// ═══════════════════════════════════════════════════════════════
//  RSS — race 3 proxies, take the winner
// ═══════════════════════════════════════════════════════════════
function proxyUrls(url) {
  const enc = encodeURIComponent(url);
  return [
    `https://corsproxy.io/?${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://api.codetabs.com/v1/proxy?quest=${url}`,
  ];
}

async function tryProxy(px, count) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 6000);
  try {
    const res = await fetch(px, { signal: ctrl.signal });
    clearTimeout(t);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
    if (xml.querySelector('parsererror')) throw new Error('bad xml');
    const items = [...xml.querySelectorAll('item')].slice(0, count);
    if (!items.length) throw new Error('empty');
    return items.map(el => ({
      title: el.querySelector('title')?.textContent?.trim() || '',
      link:  el.querySelector('link')?.nextSibling?.nodeValue?.trim()
             || el.querySelector('guid')?.textContent?.trim() || '#',
    })).filter(i => i.title && i.title !== '[Removed]');
  } catch(e) { clearTimeout(t); throw e; }
}

async function fetchRSS(url, count=6) {
  return Promise.any(proxyUrls(url).map(p => tryProxy(p, count)));
}

function renderNews(items, limit=3) {
  return items.slice(0, limit).map((it, i) => {
    const headline = it.title.replace(/ - BBC.*$/, '').replace(/ \| .*$/, '').trim();
    return `<a class="news-item" href="${it.link}" target="_blank" rel="noopener">
      <span class="news-num">${i+1}</span>
      <div class="news-headline">${headline}</div>
    </a>`;
  }).join('');
}

async function fetchBrum()  { try { document.getElementById('brum-wrap').innerHTML  = renderNews(await fetchRSS('https://feeds.bbci.co.uk/news/england/birmingham_and_black_country/rss.xml')); } catch { document.getElementById('brum-wrap').innerHTML  = `<div class="quip-main">No Brum news.</div><div class="quip-sub">Either very good or very bad.</div>`; } }
async function fetchNews()  { try { document.getElementById('news-wrap').innerHTML  = renderNews(await fetchRSS('https://feeds.bbci.co.uk/news/uk/rss.xml')); }                                catch { document.getElementById('news-wrap').innerHTML  = `<div class="quip-main">BBC gone quiet.</div><div class="quip-sub">Licence fee dispute, probably.</div>`; } }
async function fetchSport() { try { document.getElementById('sport-wrap').innerHTML = renderNews(await fetchRSS('https://feeds.bbci.co.uk/sport/rss.xml'), 3); }                              catch { document.getElementById('sport-wrap').innerHTML = `<div class="quip-main">Sport on a break.</div><div class="quip-sub">Must be a rest day.</div>`; } }

fetchBrum();  setInterval(fetchBrum,  30*60*1000);
fetchNews();  setInterval(fetchNews,  30*60*1000);
fetchSport(); setInterval(fetchSport, 30*60*1000);

// ═══════════════════════════════════════════════════════════════
//  MUSIC TICKER
// ═══════════════════════════════════════════════════════════════
const MUSIC_FEEDS = [
  'https://www.nme.com/feed/',
  'https://pitchfork.com/rss/news/',
  'https://www.rollingstone.com/music/music-news/feed/',
  'https://feeds.bbci.co.uk/news/entertainment_and_arts/rss.xml',
];

async function fetchMusic() {
  let items = null;
  for (const feed of MUSIC_FEEDS) {
    try { const g = await fetchRSS(feed, 15); if (g?.length) { items = g; break; } } catch {}
  }
  buildTicker(items
    ? items.map(i => i.title.replace(/ - (NME|BBC).*$/i,'').trim()).filter(Boolean)
    : ['Music news unavailable right now']);
}

function buildTicker(titles) {
  const el = document.getElementById('ticker-content');
  if (!el || !titles.length) return;
  const seq = titles.map(t => `<span>${t}</span><span class="t-sep">&#9834;</span>`).join('');
  el.innerHTML = seq + seq;
  el.style.animationDuration = Math.max(20, Math.round(el.scrollWidth / 2 / 50)) + 's';
}

fetchMusic(); setInterval(fetchMusic, 30*60*1000);
